<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="https://pfst.cf2.poecdn.net/base/image/a1c768bfc5420345521632a6148f392a8463114af29daaf38a4e6fe393a96537?w=1024&h=1024">
<link rel="icon" type="image/png" href="https://pfst.cf2.poecdn.net/base/image/a1c768bfc5420345521632a6148f392a8463114af29daaf38a4e6fe393a96537?w=1024&h=1024">
<title>管理者系統</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#c84b31;--primary-dark:#a83a24;--primary-light:#fdf0ed;
  --secondary:#2d8f7b;--secondary-dark:#1d7565;--secondary-light:#e4f3ef;
  --accent:#4a5899;--accent-dark:#3a4780;
  --self:#4A6274;--self-light:#EEF1F4;
  --growth:#5A8F6F;--growth-light:#EBF2EE;
  --bg:#fff;--surface:#fff;
  --text:#1a1a1a;--text-light:#5a5a5a;--text-lighter:#a0a0a0;
  --border:rgba(26,26,26,.08);
  --shadow:0 1px 4px rgba(0,0,0,.04);
  --radius:14px;--radius-sm:10px;
  --nav-h:88px;--header-h:56px;
  --serif:"Noto Serif TC","Songti TC","Georgia",serif;
  --page-accent:var(--self);
}
html{height:100%;background:var(--surface)}
body{margin:0;height:100vh;height:100dvh;display:flex;flex-direction:column;font-family:var(--serif);background:var(--surface);color:var(--text);overflow:hidden;font-size:16px}
#app{display:contents}

/* HEADER */
.header{background:var(--surface);padding:calc(env(safe-area-inset-top,0px) + 16px) 20px 14px;display:flex;align-items:center;justify-content:space-between;min-height:calc(var(--header-h) + env(safe-area-inset-top,0px));flex-shrink:0;position:relative;z-index:10;border-bottom:1px solid var(--border)}
.header::after{content:'';position:absolute;left:20px;bottom:-1px;width:40px;height:2.5px;background:var(--primary);border-radius:2px;pointer-events:none}
.header h1{color:var(--text);font-size:19px;font-weight:900;letter-spacing:4px;font-family:var(--serif)}
.header-sub{color:var(--text-lighter);font-size:11px;margin-top:2px;letter-spacing:1px}
.header-btn{background:rgba(26,26,26,0.05);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.header-btn:active{background:rgba(26,26,26,0.12)}

/* MAIN */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px;background:var(--surface)}

/* PAGES */
.page{display:none;padding:20px;animation:fadeIn .3s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* PAGE ACCENTS */
#page-situations{--page-accent:var(--primary)}
#page-learn{--page-accent:var(--self)}
#page-mine{--page-accent:var(--growth)}

/* BOTTOM NAV */
.nav{display:flex;background:var(--surface);border-top:1px solid var(--border);padding:8px 0 0;padding-bottom:8px;flex-shrink:0;position:relative;z-index:10;min-height:88px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;transition:color .2s;color:var(--text-lighter);border:none;background:none;font-family:inherit}
.nav-item.active{position:relative}
.nav-item.active::after{content:'';position:absolute;top:4px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%}
.nav-item[data-page="situations"].active{color:var(--primary-dark)}
.nav-item[data-page="situations"].active::after{background:var(--primary)}
.nav-item[data-page="learn"].active{color:var(--self)}
.nav-item[data-page="learn"].active::after{background:var(--self)}
.nav-item[data-page="mine"].active{color:var(--growth)}
.nav-item[data-page="mine"].active::after{background:var(--growth)}
.nav-item .nav-icon{display:flex;align-items:center;justify-content:center;height:24px}
.nav-item .nav-label{font-size:13px;font-weight:600}

/* GLOBAL SEARCH */
.global-search{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;flex-shrink:0}
.global-search.open{max-height:70px;padding:10px 16px}
.search-wrap{position:relative}
.search-input{width:100%;padding:14px 16px 14px 44px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:16px;background:var(--surface);color:var(--text);outline:none;transition:all .2s;font-family:inherit}
.search-input:focus{border-color:var(--primary)}
.search-input::placeholder{color:var(--text-lighter)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-lighter);pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--text-lighter);color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.show{display:flex}

/* HOME TAB TOGGLE (sub-tabs) */
.home-tab-bar{display:flex;flex-wrap:wrap;background:var(--surface);padding:4px 0;margin-bottom:16px;gap:0}
.home-tab{flex:none;padding:10px 14px;text-align:center;font-size:14px;font-weight:500;color:var(--text-lighter);border:1px solid var(--border);border-radius:20px;background:transparent;cursor:pointer;transition:all .2s;font-family:inherit;position:relative;margin:4px 3px}
.home-tab.active{font-weight:700}
.home-tab.active.tab-learn{color:#fff;background:var(--self);border-color:var(--self)}

/* FILTER BAR */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.filter-tag{padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text-lighter);cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;flex-shrink:0}
.filter-tag.active{background:var(--text);color:#fff;border-color:var(--text)}
.filter-tag:active{transform:scale(.95)}

/* SITUATION ENTRY */
.situation-section{margin-bottom:12px}
.situation-title{font-size:20px;font-weight:900;color:var(--text);margin-bottom:16px;letter-spacing:1px}
.situation-grid{display:flex;flex-direction:column;gap:10px}
.situation-card{display:flex;align-items:center;gap:14px;padding:18px 16px;border-radius:var(--radius);background:var(--sit-bg,var(--surface));border:1px solid var(--sit-border,var(--border));cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:cardEnter .3s ease both}
.situation-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sit-color,var(--text-lighter));border-radius:2px 0 0 2px;transition:width .2s}
.situation-card:active{transform:scale(.98)}.situation-card:active::before{width:8px}
.situation-card:nth-child(1){animation-delay:.05s}
.situation-card:nth-child(2){animation-delay:.12s}
.situation-card:nth-child(3){animation-delay:.19s}
.situation-card:nth-child(4){animation-delay:.26s}
.sit-icon{font-size:28px;flex-shrink:0;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:12px;background:var(--sit-icon-bg,rgba(0,0,0,.03))}
.sit-body{flex:1;min-width:0}
.sit-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px}
.sit-sub{font-size:12px;color:var(--text-light);line-height:1.4}
.sit-arrow{color:var(--text-lighter);font-size:20px;font-weight:300}
.home-divider{display:flex;align-items:center;gap:12px;margin:24px 0 16px;color:var(--text-lighter);font-size:13px;letter-spacing:1px;font-weight:500}
.home-divider::before,.home-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* SCENARIO GRID */
.scenario-grid{display:flex;flex-direction:column;gap:0}
.scenario-card{background:var(--surface);padding:18px 20px;text-align:left;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:cardEnter .3s ease both;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border)}
.scenario-card:last-child{border-bottom:none}
.scenario-card:nth-child(1){animation-delay:.03s}
.scenario-card:nth-child(2){animation-delay:.06s}
.scenario-card:nth-child(3){animation-delay:.09s}
.scenario-card:nth-child(4){animation-delay:.12s}
.scenario-card:nth-child(5){animation-delay:.15s}
.scenario-card:nth-child(6){animation-delay:.18s}
.scenario-card:active{background:var(--primary-light)}
.scenario-card::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:0;border-radius:2px;transition:height .2s}
.scenario-card:active::before{height:60%}
.scenario-card .card-icon{font-size:28px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;border-radius:10px;background:var(--bg)}
.scenario-card .card-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:2px}
.scenario-card .card-subtitle{font-size:13px;color:var(--text-lighter);line-height:1.4}
.scenario-card::after{content:'\203A';position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--text-lighter);font-weight:300}

/* Scenario card colors */
.scenario-card[data-id="hygiene"]::before{background:#2d8f7b}
.scenario-card[data-id="hygiene"] .card-icon{background:rgba(45,143,123,.08)}
.scenario-card[data-id="equipment"]::before{background:#4a5899}
.scenario-card[data-id="equipment"] .card-icon{background:rgba(74,88,153,.08)}
.scenario-card[data-id="noise"]::before{background:#b8962e}
.scenario-card[data-id="noise"] .card-icon{background:rgba(184,150,46,.08)}
.scenario-card[data-id="injury"]::before{background:#c84b31}
.scenario-card[data-id="injury"] .card-icon{background:rgba(200,75,49,.08)}
.scenario-card[data-id="emotional"]::before{background:#7b5ea7}
.scenario-card[data-id="emotional"] .card-icon{background:rgba(123,94,167,.08)}
.scenario-card[data-id="fraud"]::before{background:#a84878}
.scenario-card[data-id="fraud"] .card-icon{background:rgba(168,72,120,.08)}
.scenario-card[data-id="sub-overstep"]::before{background:#4a5899}
.scenario-card[data-id="sub-overstep"] .card-icon{background:rgba(74,88,153,.08)}
.scenario-card[data-id="sub-lazy"]::before{background:#b8962e}
.scenario-card[data-id="sub-lazy"] .card-icon{background:rgba(184,150,46,.08)}
.scenario-card[data-id="sub-depend"]::before{background:#2d8f7b}
.scenario-card[data-id="sub-depend"] .card-icon{background:rgba(45,143,123,.08)}
.scenario-card[data-id="sup-account"]::before{background:#c84b31}
.scenario-card[data-id="sup-account"] .card-icon{background:rgba(200,75,49,.08)}
.scenario-card[data-id="sup-disagree"]::before{background:#7b5ea7}
.scenario-card[data-id="sup-disagree"] .card-icon{background:rgba(123,94,167,.08)}
.scenario-card[data-id="sup-bypass"]::before{background:#505a6b}
.scenario-card[data-id="sup-bypass"] .card-icon{background:rgba(80,90,107,.08)}

/* Home section titles */
.home-section-title{display:flex;align-items:center;gap:8px;padding:14px 0 10px;margin-top:8px}
.home-section-title span{font-size:16px;font-weight:700;color:var(--text-light);letter-spacing:0.5px}
.home-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* SECTION TITLE */
.section-title{font-size:13px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 10px;padding-left:4px}
.section-title:first-child{margin-top:0}

/* CORE MINDSET CARD */
.core-mindset-card{background:var(--surface);padding:18px 20px;margin-bottom:0;display:flex;align-items:center;gap:14px;cursor:pointer;border-left:3px solid var(--page-accent);border-bottom:1px solid var(--border);transition:all .2s}
.core-mindset-card:active{background:rgba(26,26,26,.02)}
.core-mindset-icon{font-size:32px;flex-shrink:0}
.core-mindset-body{flex:1;min-width:0}
.core-mindset-label{font-size:11px;font-weight:700;color:var(--page-accent);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.core-mindset-text{font-size:14px;line-height:1.6;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.core-mindset-arrow{font-size:20px;color:var(--text-lighter);flex-shrink:0}

/* MINDSET HERO */
.mindset-hero{background:var(--surface);padding:24px 20px;margin-bottom:8px;text-align:left;color:var(--text);animation:cardEnter .4s ease both;position:relative;border-bottom:1px solid var(--border);border-left:3px solid var(--primary)}
.mindset-hero .hero-quote{font-size:20px;font-weight:900;margin-bottom:6px;font-family:var(--serif);letter-spacing:1px;color:var(--primary-dark);line-height:1.6}
.mindset-hero .hero-sub{font-size:13px;color:var(--text-lighter);letter-spacing:0.5px}

/* DETAIL OVERLAY */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.detail-overlay.open{display:flex;animation:slideUp .3s ease}
.detail-header{background:var(--surface);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;color:var(--text);border-bottom:1px solid var(--border);position:relative}
.detail-header .back-btn{background:rgba(26,26,26,0.05);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-header .back-btn:active{background:rgba(26,26,26,0.12)}
.detail-header h2{font-size:18px;font-weight:700;font-family:var(--serif);color:var(--text)}
.detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:16px 18px;padding-bottom:max(20px,env(safe-area-inset-bottom))}

/* ACCORDION */
.accordion{margin-bottom:10px;animation:cardEnter .3s ease both}
.detail-body .accordion:nth-child(1){animation-delay:.03s}
.detail-body .accordion:nth-child(2){animation-delay:.06s}
.detail-body .accordion:nth-child(3){animation-delay:.09s}
.detail-body .accordion:nth-child(4){animation-delay:.12s}
.detail-body .accordion:nth-child(5){animation-delay:.15s}
.detail-body .accordion:nth-child(6){animation-delay:.18s}
.detail-body .accordion:nth-child(7){animation-delay:.21s}
.detail-body .accordion:nth-child(8){animation-delay:.24s}
.accordion-trigger{width:100%;background:var(--surface);border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;border-radius:var(--radius-sm);transition:all .2s;font-family:inherit;text-align:left}
.accordion-trigger:active{background:rgba(26,26,26,.02)}
.accordion-trigger .acc-icon{font-size:18px;flex-shrink:0}
.accordion-trigger .acc-arrow{margin-left:auto;font-size:12px;color:var(--text-lighter);transition:transform .25s;flex-shrink:0}
.accordion.open .acc-arrow{transform:rotate(90deg)}
.accordion-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.accordion.open .accordion-content{max-height:2000px}
.accordion-inner{padding:14px 18px;background:#fff;border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-top:-4px;border:1px solid var(--border);border-top:none}
.accordion-inner p,.accordion-inner li{font-size:15px;line-height:1.8;color:var(--text-light)}
.accordion-inner ul{list-style:none;padding:0}
.accordion-inner li{padding:4px 0}
.accordion-inner li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:8px;vertical-align:middle}
.accordion-inner .action-list li::before{background:var(--secondary)}
.accordion-inner .script-list li{position:relative;padding:8px 12px;background:rgba(74,88,153,.06);border-left:3px solid var(--accent);border-radius:0 6px 6px 0;margin:6px 0}
.accordion-inner .script-list li::before{display:none}
.accordion-inner .dont-list li{color:#a83a24}
.accordion-inner .dont-list li::before{background:var(--primary)}
.accordion-inner .followup-list li::before{background:var(--accent)}

/* SUB OVERLAY */
.sub-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.sub-overlay.open{display:flex;animation:slideUp .3s ease}
.sub-header{background:var(--surface);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;color:var(--text);border-bottom:1px solid var(--border)}
.sub-header .back-btn{background:rgba(26,26,26,0.05);border:none;color:var(--text);width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sub-header h2{font-size:18px;font-weight:700;font-family:var(--serif);color:var(--text)}
.sub-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px;padding-bottom:max(20px,env(safe-area-inset-bottom))}

/* INFO SECTION */
.info-section{background:var(--surface);padding:20px;margin-bottom:0;border-bottom:1px solid var(--border)}
.info-section h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-section p,.info-section li{font-size:15px;line-height:1.8;color:var(--text-light)}
.info-section ul{list-style:none;padding:0}
.info-section li{padding:3px 0}

/* CHECKLIST */
.checklist-progress{background:var(--surface);padding:20px 24px;margin-bottom:16px;text-align:center;border-bottom:1px solid var(--border)}
.checklist-progress .progress-text{font-size:15px;color:var(--text-light);margin-bottom:8px}
.checklist-progress .progress-text span{color:var(--secondary-dark);font-weight:700;font-size:20px}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--secondary);border-radius:4px;transition:width .3s ease;width:0}
.checklist-item{background:var(--surface);padding:18px 20px;margin-bottom:0;display:flex;gap:14px;align-items:flex-start;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none;animation:cardEnter .3s ease both;border-bottom:1px solid var(--border);border-left:3px solid var(--secondary)}
.checklist-item:active{background:rgba(45,143,123,.04)}
.checklist-item.checked{background:rgba(228,222,212,.85);border-left-color:var(--text-lighter)}
.checklist-item .check-box{width:30px;height:30px;border:2px solid var(--border);border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;margin-top:2px}
.checklist-item.checked .check-box{background:var(--secondary);border-color:var(--secondary);color:#fff}
.checklist-item .check-step{font-size:12px;color:var(--secondary);font-weight:700;margin-bottom:3px}
.checklist-item .check-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.checklist-item .check-desc{font-size:14px;color:var(--text-light);line-height:1.6}
.checklist-item.checked .check-step{color:var(--text-lighter)}
.checklist-item.checked .check-title{text-decoration:line-through;color:var(--text-lighter)}
.checklist-item.checked .check-desc{color:var(--text-lighter)}
.reset-btn{display:block;margin:20px auto;background:var(--surface);border:1px solid var(--border);color:var(--text-lighter);padding:12px 32px;border-radius:var(--radius-sm);font-size:14px;cursor:pointer;transition:all .2s;font-family:inherit}
.reset-btn:active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* PHRASE ITEMS */
.phrase-item{background:var(--surface);padding:18px 20px;margin-bottom:0;border-left:3px solid var(--primary);border-bottom:1px solid var(--border);animation:cardEnter .3s ease both}
.phrase-item .phrase-situation{font-size:12px;font-weight:700;color:var(--primary);letter-spacing:0.5px;margin-bottom:6px}
.phrase-item .phrase-text{font-size:16px;font-weight:600;color:var(--text);line-height:1.6}

/* RECORD FORM */
.record-form{background:var(--surface);overflow:hidden;margin-bottom:0;border-bottom:1px solid var(--border)}
.form-row{display:flex;border-bottom:1px solid var(--border)}
.form-row:last-child{border-bottom:none}
.form-label{width:110px;flex-shrink:0;padding:12px;font-size:14px;font-weight:600;color:var(--text);background:rgba(42,42,42,.05)}
.form-value{flex:1;padding:12px;font-size:14px;color:var(--text-light)}

/* SELFCARE */
.selfcare-tip{background:var(--secondary-light);padding:20px;margin-bottom:0;border-bottom:1px solid var(--border);border-left:3px solid var(--secondary)}
.selfcare-tip h3{font-size:16px;font-weight:700;color:var(--secondary-dark);margin-bottom:8px}
.selfcare-tip p,.selfcare-tip li{font-size:15px;line-height:1.8;color:var(--text-light)}

/* EMERGENCY BTN */
.emergency-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:16px 20px;border-radius:var(--radius-sm);border:2px solid var(--primary);background:#fff;color:var(--primary);font-size:16px;font-weight:700;cursor:pointer;margin-bottom:18px;font-family:inherit;transition:all .2s}
.emergency-btn:active{background:var(--primary);color:#fff}

/* DAO STATE */
.dao-state{display:inline-block;font-size:10px;padding:2px 8px;border-radius:10px;margin-top:6px;font-weight:600;letter-spacing:.3px}
.dao-state[data-s="new"]{background:rgba(160,152,144,.1);color:var(--text-lighter)}
.dao-state[data-s="practicing"]{background:rgba(184,146,45,.12);color:#9A7A20}
.dao-state[data-s="mastered"]{background:rgba(90,143,111,.12);color:var(--growth)}
.state-picker-inline{display:flex;gap:6px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.state-pick-btn{flex:1;padding:10px 4px;border-radius:var(--radius);font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text-lighter);cursor:pointer;font-family:inherit;transition:all .2s;text-align:center}
.state-pick-btn:active{transform:scale(.96)}
.state-pick-btn.active-new{border-color:var(--text-lighter);color:var(--text-lighter);background:rgba(160,152,144,.06)}
.state-pick-btn.active-practicing{border-color:#9A7A20;color:#9A7A20;background:rgba(184,146,45,.06)}
.state-pick-btn.active-mastered{border-color:var(--growth);color:var(--growth);background:rgba(90,143,111,.06)}

/* PROGRESS OVERVIEW */
.progress-overview{padding:20px 0;margin-bottom:8px;border-bottom:1px solid var(--border)}
.progress-stats{display:flex;justify-content:space-around;margin:14px 0}
.stat{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-num{font-size:24px;font-weight:700}
.stat-num.num-new{color:var(--text-lighter)}
.stat-num.num-practicing{color:#9A7A20}
.stat-num.num-mastered{color:var(--growth)}
.stat-label{font-size:10px;color:var(--text-lighter);font-weight:600;letter-spacing:.5px}
.progress-bar-wrap{height:4px;background:rgba(0,0,0,.05);border-radius:2px;overflow:hidden;display:flex;margin-top:6px}
.progress-seg{height:100%;transition:width .4s}
.progress-seg.seg-mastered{background:var(--growth);border-radius:2px 0 0 2px}
.progress-seg.seg-practicing{background:#D4B044}

/* JOURNAL */
.journal-add-btn{display:flex;align-items:center;justify-content:flex-start;gap:8px;width:100%;padding:14px;border-radius:var(--radius);border:1.5px solid var(--border);background:transparent;color:var(--text-light);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s;margin-bottom:16px}
.journal-add-btn:active{opacity:.6}
.journal-entry{padding:18px 0;border-bottom:1px solid var(--border)}
.journal-date{font-size:11px;color:var(--text-lighter);font-weight:600;margin-bottom:6px}
.journal-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.journal-tag{font-size:11px;padding:2px 8px;border-radius:4px;background:rgba(45,42,38,.05);color:var(--text-light);font-weight:600}
.journal-text{font-size:14px;line-height:1.7;color:var(--text-light)}
.daily-quote{text-align:center;padding:32px 20px;margin-bottom:16px;font-size:15px;font-style:italic;color:var(--text-lighter);line-height:2}
.review-card{padding:24px 0;margin-bottom:12px;margin-top:24px;border-top:1px solid var(--border)}
.review-card h3{font-size:14px;font-weight:700;color:var(--text-light);margin-bottom:10px}
.review-q{font-size:14px;color:var(--text-light);padding:6px 0;line-height:1.6}
.review-q::before{content:'\203A';margin-right:8px;color:var(--text-lighter);font-weight:700}
.export-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--text-lighter);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:12px}
.export-btn:active{opacity:.6}

/* JOURNAL MODAL */
.journal-modal{position:fixed;inset:0;z-index:200;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4)}
.journal-modal.open{display:flex}
.journal-modal-content{background:var(--surface);border-radius:16px 16px 0 0;width:100%;max-width:500px;max-height:85vh;overflow-y:auto;padding:24px 20px;padding-bottom:max(24px,env(safe-area-inset-bottom));animation:slideUp .3s ease}
.jm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.jm-header h3{font-size:18px;font-weight:700;color:var(--text)}
.jm-close{background:none;border:none;font-size:22px;color:var(--text-lighter);cursor:pointer;padding:4px}
.jm-label{font-size:12px;font-weight:700;color:var(--text-lighter);margin-bottom:6px;letter-spacing:.5px}
.jm-date{width:100%;padding:12px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;color:var(--text);font-family:inherit;margin-bottom:14px;background:var(--surface)}
.jm-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.jm-tag{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text-light);cursor:pointer;font-family:inherit;transition:all .2s}
.jm-tag.selected{background:var(--growth);color:#fff;border-color:var(--growth)}
.jm-textarea{width:100%;min-height:120px;padding:14px;border:1px solid var(--border);border-radius:var(--radius);font-size:15px;line-height:1.7;color:var(--text);font-family:inherit;resize:vertical;background:var(--surface)}
.jm-textarea::placeholder{color:var(--text-lighter)}
.jm-save{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--growth);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px}
.jm-save:active{opacity:.85}

/* BREATHING TIMER */
.breath-widget{text-align:center;padding:20px 0 10px}
.breath-start-btn{background:#fff;color:var(--secondary);border:2px solid var(--secondary);padding:12px 32px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.breath-start-btn:active{transform:scale(0.95)}
.breath-circle-wrap{display:none;flex-direction:column;align-items:center;gap:14px}
.breath-circle-wrap.active{display:flex}
.breath-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--secondary-light),#e8f0e8);border:4px solid var(--secondary);display:flex;align-items:center;justify-content:center;transition:transform 4s ease-in-out,border-color .5s;position:relative}
.breath-circle.inhale{transform:scale(1.35);border-color:var(--secondary)}
.breath-circle.hold{transform:scale(1.35);border-color:var(--accent)}
.breath-circle.exhale{transform:scale(1);border-color:var(--primary);transition:transform 6s ease-in-out,border-color .5s}
.breath-label{font-size:18px;font-weight:700;color:var(--secondary-dark)}
.breath-phase{font-size:15px;color:var(--text-light);font-weight:600}
.breath-count{font-size:13px;color:var(--text-lighter)}

/* SEARCH RESULTS */
.search-results{display:none}
.search-results.show{display:block}
.search-result-item{background:var(--surface);padding:16px 20px;margin-bottom:0;cursor:pointer;transition:all .2s;border-bottom:1px solid var(--border)}
.search-result-item:active{background:rgba(26,26,26,.02)}
.search-result-item .result-tag{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:6px;font-weight:600}
.search-result-item .result-text{font-size:15px;line-height:1.6}
.search-result-item mark{background:rgba(200,75,49,.12);color:var(--primary-dark);padding:1px 4px;border-radius:2px}
.search-no-result{text-align:center;padding:40px 20px;color:var(--text-light)}
.search-no-result .no-result-icon{font-size:48px;margin-bottom:12px;display:block}

/* PAGE DESC */
.page-desc{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:14px;line-height:1.5}

/* GUIDE HINT */
.guide-hint{font-size:13px;color:var(--text-light);line-height:1.7;padding:12px 16px;margin-bottom:20px;background:rgba(74,98,116,.03);border-radius:var(--radius-sm);border-left:2px solid var(--page-accent)}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(42,42,42,0.92);color:#f0eeeb;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* WELCOME OVERLAY */
.welcome-overlay{position:fixed;inset:0;z-index:300;background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;text-align:center;animation:fadeIn .4s ease}
.welcome-overlay.hidden{display:none}
.welcome-step{display:none;flex-direction:column;align-items:center;max-width:340px}
.welcome-step.active{display:flex}
.welcome-title{font-size:24px;font-weight:900;color:var(--text);letter-spacing:2px;margin-bottom:14px;line-height:1.5}
.welcome-text{font-size:15px;color:var(--text-light);line-height:1.9;margin-bottom:32px}
.welcome-text b{color:var(--text);font-weight:700}
.welcome-btn{padding:14px 40px;border-radius:var(--radius);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
.welcome-btn:active{opacity:.7}
.welcome-btn-primary{background:var(--text);color:var(--surface)}
.welcome-btn-skip{background:transparent;border:1px solid var(--border);color:var(--text-lighter);margin-top:12px}
.welcome-dots{display:flex;gap:8px;margin-top:24px}
.welcome-dot{width:6px;height:6px;border-radius:50%;background:var(--border)}
.welcome-dot.active{background:var(--text)}

/* PULSE ANIMATION */
@keyframes softPulse{0%,100%{box-shadow:0 0 0 0 rgba(90,143,111,.3)}50%{box-shadow:0 0 0 8px rgba(90,143,111,0)}}
.journal-add-btn{animation:softPulse 3s ease infinite 2s}

/* NAV DOT TRANSITION */
.nav-item.active::after{animation:dotIn .3s ease}
@keyframes dotIn{from{transform:translateX(-50%) scale(0)}to{transform:translateX(-50%) scale(1)}}

/* FIRST-VISIT PULSE ON NAV */
@keyframes navPulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-hint-dot{position:absolute;top:6px;right:calc(50% - 18px);width:6px;height:6px;border-radius:50%;background:var(--primary);animation:navPulse 1.5s ease infinite}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--text-lighter);border-radius:2px}

/* SKILL SELECTOR IN JOURNAL MODAL */
.jm-skill-cat{margin-bottom:10px}
.jm-skill-cat-header{display:flex;align-items:center;gap:6px;padding:8px 0;cursor:pointer;font-size:13px;font-weight:700;color:var(--text-light);user-select:none;-webkit-user-select:none}
.jm-skill-cat-header .cat-arrow{font-size:11px;color:var(--text-lighter);transition:transform .2s}
.jm-skill-cat-header.open .cat-arrow{transform:rotate(90deg)}
.jm-skill-chips{display:none;flex-wrap:wrap;gap:6px;padding:0 0 8px}
.jm-skill-cat-header.open+.jm-skill-chips{display:flex}
.jm-skill-chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--surface);color:var(--text-lighter);cursor:pointer;font-family:inherit;transition:all .2s;user-select:none;-webkit-user-select:none}
.jm-skill-chip.done{background:var(--growth);color:#fff;border-color:var(--growth)}
.jm-skill-chip.practicing{background:rgba(184,146,45,.1);color:#9A7A20;border-color:#D4B044}

/* COLLAPSIBLE SECTIONS */
.collapsible-header{display:flex;align-items:center;gap:8px;padding:14px 0 10px;margin-top:8px;cursor:pointer;user-select:none;-webkit-user-select:none}
.collapsible-header span{font-size:16px;font-weight:700;color:var(--text-light);letter-spacing:0.5px}
.collapsible-header::after{content:'';flex:1;height:1px;background:var(--border)}

/* BACK TO TOP BUTTON */
.back-to-top{position:fixed;right:16px;bottom:calc(var(--nav-h) + 12px);width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text-lighter);font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50;box-shadow:0 2px 8px rgba(0,0,0,.1);transition:opacity .2s}
.back-to-top.show{display:flex}
.back-to-top:active{opacity:.6}

/* BATTLE RECORD (實戰記錄) */
.battle-cat{margin-bottom:8px}
.battle-cat-header{display:flex;align-items:center;gap:8px;padding:12px 0;cursor:pointer;user-select:none;-webkit-user-select:none;border-bottom:1px solid var(--border)}
.battle-cat-header .bcat-arrow{font-size:11px;color:var(--text-lighter);transition:transform .2s;flex-shrink:0}
.battle-cat-header.open .bcat-arrow{transform:rotate(90deg)}
.battle-cat-header .bcat-label{font-size:14px;font-weight:700;color:var(--text)}
.battle-cat-header .bcat-summary{font-size:12px;color:var(--text-lighter);margin-left:auto}
.battle-cat-body{display:none;padding:4px 0 8px}
.battle-cat-header.open+.battle-cat-body{display:block}
.battle-item{font-size:13px;color:var(--text-light);padding:6px 0;line-height:1.6;border-bottom:1px solid rgba(0,0,0,.03)}
.battle-item:last-child{border-bottom:none}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->
  <div class="header">
    <div style="display:flex;align-items:center;gap:10px"><img src="https://pfst.cf2.poecdn.net/base/image/a1c768bfc5420345521632a6148f392a8463114af29daaf38a4e6fe393a96537?w=1024&h=1024" style="width:34px;height:34px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.15)" alt=""><div><h1>管理者系統</h1><div class="header-sub" id="headerSub">需要的時候，翻一翻就好</div></div></div>
    <button class="header-btn" onclick="toggleGlobalSearch()" id="searchToggle">&#x1F50D;</button>
  </div>
  <!-- GLOBAL SEARCH BAR -->
  <div class="global-search" id="globalSearch">
    <div class="search-wrap" style="margin:0">
      <span class="search-icon">&#x1F50D;</span>
      <input class="search-input" type="text" id="searchInput" placeholder="搜尋關鍵字" oninput="handleSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">&#x2715;</button>

      <div id="searchResults" class="search-results show"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="nav">
    <button class="nav-item active" data-page="situations" onclick="switchPage('situations')">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></span><span class="nav-label">遇到了</span>
    </button>
    <button class="nav-item" data-page="learn" onclick="switchPage('learn')">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span><span class="nav-label">學起來</span>
    </button>
    <button class="nav-item" data-page="mine" onclick="switchPage('mine')">
      <span class="nav-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span class="nav-label">我的</span>
    </button>
  </div>

  <!-- DETAIL OVERLAY -->
  <div class="detail-overlay" id="detailOverlay">
    <div class="detail-header" id="detailHeader">
      <button class="back-btn" onclick="closeDetail()">&#x2190;</button>
      <h2 id="detailTitle"></h2>
    </div>
    <div class="detail-body" id="detailBody"></div>
  </div>

  <!-- SUB OVERLAY -->
  <div class="sub-overlay" id="subOverlay">

      <button class="back-btn" onclick="closeSub()">&#x2190;</button>
      <h2 id="subTitle"></h2>
    </div>
    <div class="sub-body" id="subBody"></div>
  </div>

  <!-- JOURNAL MODAL -->
  <div class="journal-modal" id="journalModal">
    <div class="journal-modal-content">
      <div class="jm-header">
        <h3>&#x270F;&#xFE0F; 寫一筆筆記</h3>
        <button class="jm-close" onclick="closeJournalModal()">&#x2715;</button>
      </div>
      <div id="jmSource" style="display:none;font-size:13px;color:var(--self);background:var(--self-light);padding:8px 14px;border-radius:var(--radius-sm);margin-bottom:14px;font-weight:600"></div>
      <div class="jm-label">日期</div>
      <input type="date" class="jm-date" id="jmDate">
      <div class="jm-label">這次用了什麼？（可不選）</div>
      <div id="jmSkills"></div>

      <div class="jm-label">下次想試什麼？</div>

      <button class="jm-save" onclick="saveJournal()">儲存</button>

  </div>

  <!-- WELCOME OVERLAY -->
  <div class="welcome-overlay" id="welcomeOverlay">
    <div class="welcome-step active" id="welcomeStep0">

  <!-- BACK TO TOP -->

  <!-- TOAST -->
  <div class="toast" id="toast"></div>
</div>
<script>
// ============================================================
// DATA
// ============================================================
const SCENARIOS = [
  {
    id:'hygiene', icon:'\u{1F9F9}', title:'客房衛生投訴', subtitle:'血跡、毛髮、污漬等', color:'#2d8f7b', colorLight:'#e4f3ef',
    situations:['客人發現床單/枕頭上有血跡','浴室有毛髮、污漬、異味','地毯有明顯髒污或蟲害痕跡'],

function cycleSkillChip(el){
  if(!el.classList.contains('done')&&!el.classList.contains('practicing')){
    el.classList.add('done');el.textContent='\u2713 '+el.textContent;
  }else if(el.classList.contains('done')){
    el.classList.remove('done');el.classList.add('practicing');
    el.textContent='\u25CB '+el.textContent.replace(/^\u2713 /,'');
  }else{
    el.classList.remove('practicing');
    el.textContent=el.textContent.replace(/^\u25CB /,'');
  }
}

function saveJournal(){
  var date=document.getElementById('jmDate').value;
  var what=document.getElementById('jmWhat').value.trim();
  var how=document.getElementById('jmHow').value.trim();
  var next=document.getElementById('jmNext').value.trim();
  if(!what&&!how&&!next){showToast('\u8ACB\u81F3\u5C11\u586B\u5BEB\u4E00\u500B\u6B04\u4F4D');return}
  var skills=[];
  document.querySelectorAll('#jmSkills .jm-skill-chip.done, #jmSkills .jm-skill-chip.practicing').forEach(function(el){
    skills.push({id:el.getAttribute('data-skill-id'),done:el.classList.contains('done')});
  });
  var entry={date:date,tags:[],skills:skills,what:what,how:how,next:next};
  // backward compat: also store combined text for export/search
  entry.text=[what?'\u904A\u5230\uFF1A'+what:'',how?'\u8655\u7406\uFF1A'+how:'',next?'\u4E0B\u6B21\uFF1A'+next:''].filter(Boolean).join('\n');
  if(_journalSource)entry.source=_journalSource;
  addJournalEntry(entry);_journalSource='';closeJournalModal();renderMine();showToast('\u5DF2\u5132\u5B58 \u2713');
}
function exportJournal(){
  var entries=getJournalEntries();if(!entries.length){showToast('\u9084\u6C92\u6709\u8A18\u9304\u53EF\u4EE5\u532F\u51FA');return}
  var lines=['=== \u7B46\u8A18\u532F\u51FA ===','\u532F\u51FA\u6642\u9593\uFF1A'+new Date().toLocaleString('zh-TW'),'',''];
  entries.forEach(function(e){
    lines.push('\u65E5\u671F\uFF1A'+e.date);if(e.source)lines.push('\u4F86\u81EA\uFF1A'+e.source);
    if(e.tags&&e.tags.length)lines.push('\u6A19\u7C64\uFF1A'+e.tags.join('\u3001'));
    if(e.skills&&e.skills.length){
      var skLabels=e.skills.map(function(sk){var item=LEARN_ITEMS.find(function(li){return li.id===sk.id});return (item?item.label:sk.id)+(sk.done?'(\u505A\u5230)':'(\u7DF4\u7FD2)')});
      lines.push('\u6280\u80FD\uFF1A'+skLabels.join('\u3001'));
    }
    if(e.what)lines.push('\u904A\u5230\uFF1A'+e.what);if(e.how)lines.push('\u8655\u7406\uFF1A'+e.how);if(e.next)lines.push('\u4E0B\u6B21\uFF1A'+e.next);
    if(!e.what&&!e.how&&!e.next&&e.text)lines.push('\u5167\u5BB9\uFF1A'+e.text);lines.push('---');lines.push('')});
  // --- 實戰記錄總覽 ---
  var skillAgg={};
  LEARN_ITEMS.forEach(function(it){skillAgg[it.id]={done:0,practicing:0}});
  entries.forEach(function(e){if(e.skills)e.skills.forEach(function(sk){if(!skillAgg[sk.id])skillAgg[sk.id]={done:0,practicing:0};if(sk.done)skillAgg[sk.id].done++;else skillAgg[sk.id].practicing++})});
  lines.push('=== \u5BE6\u6230\u8A18\u9304\u7E3D\u89BD ===');
  LEARN_CAT_ORDER.forEach(function(cat){
    lines.push('\u3010'+LEARN_CATS[cat]+'\u3011');
    LEARN_ITEMS.filter(function(it){return it.cat===cat}).forEach(function(it){
      var a=skillAgg[it.id];
      if(a.done>0||a.practicing>0)lines.push('  '+it.label+'\uFF1A\u505A\u5230 '+a.done+' \u6B21\uFF0C\u7DF4\u7FD2 '+a.practicing+' \u6B21');
      else lines.push('  '+it.label+'\uFF1A\u9084\u6C92\u9047\u5230');
    });
    lines.push('');
  });
  var blob=new Blob([lines.join('\n')],{type:'text/plain;charset=utf-8'});
  var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='\u7B46\u8A18_'+new Date().toISOString().slice(0,10)+'.txt';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('已匯出 \u2713');
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}
function highlightText(text,query){var regex=new RegExp('('+escapeRegex(query)+')','gi');return escapeHtml(text).replace(regex,'<mark>$1</mark>')}
function copyText(text){navigator.clipboard.writeText(text).then(function(){showToast('已複製到剪貼板 \u{1F4CB}')}).catch(function(){var ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已複製到剪貼板 \u{1F4CB}')})}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

// ============================================================
// BREATHING TIMER
// ============================================================
var _breathTimer=null;
function startBreathing(){
  var btn=document.getElementById('breathStartBtn');var wrap=document.getElementById('breathCircle');
  var ball=document.getElementById('breathBall');var label=document.getElementById('breathLabel');
  var phase=document.getElementById('breathPhase');var countEl=document.getElementById('breathCount');
  btn.style.display='none';wrap.classList.add('active');
  var cycles=3;var currentCycle=0;
  function runCycle(){
    if(currentCycle>=cycles){label.textContent='\u2713';phase.textContent='準備好了';countEl.textContent='';ball.className='breath-circle';
      setTimeout(function(){wrap.classList.remove('active');btn.style.display='';btn.textContent='\u{1FAB7} 再來一次（3 組）'},2000);return}
    countEl.textContent='第 '+(currentCycle+1)+' / '+cycles+' 次';
    ball.className='breath-circle inhale';label.textContent='吸氣';phase.textContent='慢慢吸氣... 4秒';
    var sec=4;clearInterval(_breathTimer);
    _breathTimer=setInterval(function(){sec--;if(sec>0)phase.textContent='慢慢吸氣... '+sec+'秒'},1000);
    setTimeout(function(){clearInterval(_breathTimer);ball.className='breath-circle hold';label.textContent='屏住';phase.textContent='屏住呼吸... 4秒';sec=4;
      _breathTimer=setInterval(function(){sec--;if(sec>0)phase.textContent='屏住呼吸... '+sec+'秒'},1000);
      setTimeout(function(){clearInterval(_breathTimer);ball.className='breath-circle exhale';label.textContent='呼氣';phase.textContent='慢慢呼氣... 6秒';sec=6;
        _breathTimer=setInterval(function(){sec--;if(sec>0)phase.textContent='慢慢呼氣... '+sec+'秒'},1000);
        setTimeout(function(){clearInterval(_breathTimer);currentCycle++;runCycle()},6000)},4000)},4000)}
  runCycle();
}

function renderMine(){
  var page=document.getElementById('page-mine');
  var h='<div style="padding-top:4px;margin-bottom:16px"><div style="font-size:20px;font-weight:900;font-family:var(--serif);letter-spacing:2px;color:var(--text)">\u7B46\u8A18</div><div style="font-size:13px;color:var(--text-lighter);margin-top:4px">\u8A18\u9304\u6BCF\u4E00\u6B65\uFF0C\u770B\u898B\u81EA\u5DF1\u7684\u8ECC\u8DE1\u3002</div></div>';
  var entries=getJournalEntries();
  var hasAnyEntries=entries.length>0;
  if(!hasAnyEntries){
    h+='<div style="text-align:left;padding:28px 16px 8px">';
    h+='<div style="font-size:15px;color:var(--text-light);line-height:2;margin-bottom:20px">\u9084\u6C92\u6709\u8A18\u9304\uFF1F\u5F88\u6B63\u5E38\u3002<br>\u5148\u53BB\u7FFB\u7FFB\u5176\u4ED6\u9801\u9762\uFF0C<br>\u770B\u5B8C\u4EFB\u4F55\u5167\u5BB9\u5F8C\u9EDE\u300C\u{1F4DD} \u8A18\u4E00\u7B46\u300D\uFF0C<br>\u6216\u8005\u73FE\u5728\u5C31\u8A66\u8A66 \u2193</div>';
    h+='<button class="journal-add-btn" onclick="openJournalModal()" style="background:var(--growth);color:#fff;border-color:var(--growth);font-size:16px;padding:16px;font-weight:700">\u{1F3AF} \u5BEB\u4F60\u7684\u7B2C\u4E00\u7B46</button>';
    h+='</div>';
    h+='<div style="background:rgba(90,143,111,.04);border:1px dashed rgba(90,143,111,.2);border-radius:var(--radius);padding:18px;margin:16px 0">';
    h+='<div style="font-size:12px;color:var(--text-lighter);font-weight:600;margin-bottom:8px">\u{1F4AC} \u793A\u7BC4\u7B46\u8A18\u9577\u9019\u6A23\uFF1A</div>';
    h+='<div style="font-size:13px;color:var(--text-light);line-height:1.8">';
    h+='<div style="margin-bottom:6px"><span style="color:var(--growth);font-weight:600">\u904A\u5230\uFF1A</span>\u5BA2\u4EBA\u6295\u8A34\u623F\u9593\u6709\u6BDB\u9AEE\uFF0C\u8A9E\u6C23\u5F88\u5DEE</div>';
    h+='<div style="margin-bottom:6px"><span style="color:var(--growth);font-weight:600">\u8655\u7406\uFF1A</span>\u7528\u4E86\u300C\u5148\u9053\u6B49\u518D\u63DB\u623F\u300D\u6D41\u7A0B\uFF0C\u5BA2\u4EBA\u5F8C\u4F86\u6C92\u518D\u62B1\u6028</div>';
    h+='<div><span style="color:var(--growth);font-weight:600">\u4E0B\u6B21\uFF1A</span>\u53CD\u61C9\u518D\u5FEB\u4E00\u9EDE\uFF0C\u5148\u78BA\u8A8D\u5BA2\u4EBA\u60C5\u7DD2\u518D\u63D0\u65B9\u6848</div>';
    h+='</div></div>';
  }else{
    h+='<div class="guide-hint">\u4F60\u7684\u5BE6\u6230\u8A18\u9304\u548C\u7B46\u8A18\u90FD\u5728\u9019\u88E1\u3002\u6BCF\u9031\u56DE\u4F86\u770B\u770B\u3002</div>';
  }
  // --- 實戰記錄 ---
  var skillAgg={};
  LEARN_ITEMS.forEach(function(it){skillAgg[it.id]={done:0,practicing:0,lastDate:null}});
  entries.forEach(function(e){
    if(e.skills&&e.skills.length){
      e.skills.forEach(function(sk){
        if(!skillAgg[sk.id])skillAgg[sk.id]={done:0,practicing:0,lastDate:null};
        if(sk.done)skillAgg[sk.id].done++;else skillAgg[sk.id].practicing++;
        if(!skillAgg[sk.id].lastDate||e.date>skillAgg[sk.id].lastDate)skillAgg[sk.id].lastDate=e.date;
      });
    }
  });
  h+='<div class="section-title">\u5BE6 \u6230 \u8A18 \u9304</div>';
  LEARN_CAT_ORDER.forEach(function(cat){
    var catItems=LEARN_ITEMS.filter(function(it){return it.cat===cat});
    var usedCount=catItems.filter(function(it){return skillAgg[it.id]&&(skillAgg[it.id].done>0||skillAgg[it.id].practicing>0)}).length;
    h+='<div class="battle-cat">';
    h+='<div class="battle-cat-header" onclick="this.classList.toggle(\'open\')"><span class="bcat-arrow">\u25B6</span><span class="bcat-label">'+LEARN_CATS[cat]+'\u00B7'+catItems.length+'</span><span class="bcat-summary">\u7528\u904E '+usedCount+' \u9805</span></div>';
    h+='<div class="battle-cat-body">';
    catItems.forEach(function(it){
      var agg=skillAgg[it.id];
      if(agg&&(agg.done>0||agg.practicing>0)){
        h+='<div class="battle-item">\u2713 '+it.label+' \u2014\u2014 \u505A\u5230 '+agg.done+' \u6B21 \uFF5C \u25CB \u7DF4\u7FD2 '+agg.practicing+' \u6B21  \u6700\u8FD1\uFF1A'+agg.lastDate+'</div>';
      }else{
        h+='<div class="battle-item" style="color:var(--text-lighter)">\u2014\u2014 '+it.label+' \u9084\u6C92\u9047\u5230</div>';
      }
    });
    h+='</div></div>';
  });
  // Practice insights
  var now=new Date();var weekAgo=new Date(now.getTime()-7*24*60*60*1000);
  var weekStr=weekAgo.getFullYear()+'-'+String(weekAgo.getMonth()+1).padStart(2,'0')+'-'+String(weekAgo.getDate()).padStart(2,'0');
  var thisWeek=entries.filter(function(e){return e.date>=weekStr});
  var tagFreq={};entries.forEach(function(e){if(e.tags)e.tags.forEach(function(t){tagFreq[t]=(tagFreq[t]||0)+1})});
  var topTags=Object.keys(tagFreq).sort(function(a,b){return tagFreq[b]-tagFreq[a]}).slice(0,5);
  var touchedTags={};entries.forEach(function(e){if(e.tags)e.tags.forEach(function(t){touchedTags[t]=true})});
  var untouchedTags=JOURNAL_TAGS.filter(function(t){return !touchedTags[t]});
  if(entries.length>0){
    h+='<div class="section-title">\u5BE6 \u6230 \u6D1E \u5BDF</div>';
    h+='<div style="font-size:14px;color:var(--text-light);line-height:1.8;padding:0 0 16px">\u672C\u9031\u8A18\u9304 <strong>'+thisWeek.length+'</strong> \u7B46</div>';
    if(topTags.length>0){h+='<div style="margin-bottom:16px"><div style="font-size:12px;color:var(--text-lighter);font-weight:600;margin-bottom:8px">\u7DF4\u7FD2\u6700\u591A\u7684\u9818\u57DF</div>';
      topTags.forEach(function(t){var pct=Math.round(tagFreq[t]/entries.length*100);h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><span style="font-size:13px;color:var(--text-light);width:80px;flex-shrink:0">'+t+'</span><div style="flex:1;height:4px;background:rgba(0,0,0,.05);border-radius:2px"><div style="height:100%;width:'+pct+'%;background:var(--growth);border-radius:2px"></div></div><span style="font-size:11px;color:var(--text-lighter);width:24px;text-align:right">'+tagFreq[t]+'</span></div>'});h+='</div>'}
    if(untouchedTags.length>0){h+='<div style="font-size:12px;color:var(--text-lighter);font-weight:600;margin-bottom:6px">\u5C1A\u672A\u89F8\u78B0</div><div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px">';untouchedTags.forEach(function(t){h+='<span style="font-size:12px;padding:4px 10px;border-radius:12px;background:rgba(0,0,0,.03);color:var(--text-lighter)">'+t+'</span>'});h+='</div>'}
  }
  h+='<div class="daily-quote">「'+getDailyQuote()+'」</div>';
  h+='<div class="section-title">筆 記</div>';
  h+='<button class="journal-add-btn" onclick="openJournalModal()">\uFF0B \u5BEB\u4E00\u7B46</button>';
  if(entries.length>0){entries.forEach(function(e){
    h+='<div class="journal-entry"><div class="journal-date">'+e.date+'<span style="float:right;cursor:pointer;color:var(--text-lighter);font-size:14px" onclick="confirmDeleteJournal('+e.id+')">\u2715</span></div>';
    if(e.source)h+='<div style="font-size:12px;color:var(--self);font-weight:600;margin-bottom:6px">\u4F86\u81EA\uFF1A'+escapeHtml(e.source)+'</div>';
    if(e.tags&&e.tags.length)h+='<div class="journal-tags">'+e.tags.map(function(t){return '<span class="journal-tag">'+t+'</span>'}).join('')+'</div>';
    if(e.skills&&e.skills.length){h+='<div class="journal-tags">'+e.skills.map(function(sk){var item=LEARN_ITEMS.find(function(li){return li.id===sk.id});var lbl=item?item.label:sk.id;return '<span class="journal-tag" style="'+(sk.done?'background:rgba(90,143,111,.1);color:var(--growth)':'background:rgba(184,146,45,.1);color:#9A7A20')+'">'+(sk.done?'\u2713 ':'\u25CB ')+lbl+'</span>'}).join('')+'</div>'}
    if(e.what||e.how||e.next){
      if(e.what)h+='<div class="journal-text"><span style="color:var(--growth);font-weight:600">\u904A\u5230\uFF1A</span>'+escapeHtml(e.what)+'</div>';
      if(e.how)h+='<div class="journal-text"><span style="color:var(--growth);font-weight:600">\u8655\u7406\uFF1A</span>'+escapeHtml(e.how)+'</div>';
      if(e.next)h+='<div class="journal-text"><span style="color:var(--growth);font-weight:600">\u4E0B\u6B21\uFF1A</span>'+escapeHtml(e.next)+'</div>';
    }else if(e.text){
      h+='<div class="journal-text">'+escapeHtml(e.text).replace(/\n/g,'<br>')+'</div>';
    }
    h+='</div>';
  })}else{h+='<div style="text-align:left;padding:30px 20px;color:var(--text-lighter);font-size:14px;line-height:1.7">\u9084\u6C92\u6709\u8A18\u9304<br>\u770B\u5B8C\u4EFB\u4F55\u5167\u5BB9\u5F8C\uFF0C\u9EDE\u300C\u{1F4DD} \u8A18\u4E00\u7B46\u300D\u958B\u59CB\u7D2F\u7A4D</div>'}
  h+='<div class="review-card"><h3>\u{1F504} 每週回顧</h3>';
  if(thisWeek.length>0){h+='<div class="review-q">這週記錄了 '+thisWeek.length+' 筆——哪次你處理得最好？</div>';if(topTags.length>0)h+='<div class="review-q">你在「'+topTags[0]+'」上練最多——進步了嗎？</div>';if(untouchedTags.length>0)h+='<div class="review-q">「'+untouchedTags[0]+'」還沒碰過——下週要試嗎？</div>'}
  else{h+='<div class="review-q">這週還沒有記錄——今天有什麼值得記下來的嗎？</div>'}
  h+='<div class="review-q">下週我想嘗試什麼不同的做法？（只挑一件）</div></div>';
  h+='<button class="export-btn" onclick="exportJournal()">\u{1F4E4} 匯出所有記錄</button>';
  h+='<div style="height:24px"></div>';
  page.innerHTML=h;
}

function updateGreeting(){
  var h=new Date().getHours();var sub=document.getElementById('headerSub');
  if(!sub)return;
  if(h>=5&&h<12) sub.textContent='\u65E9\u5B89\uFF0C\u4ECA\u5929\u6703\u662F\u597D\u7684\u4E00\u5929 \u2600\uFE0F';
  else if(h>=12&&h<18) sub.textContent='\u4E0B\u5348\u4E86\uFF0C\u8F9B\u82E6\u4E86 \u{1F4AA}';
  else sub.textContent='\u5FD9\u5B8C\u4E86\u55CE\uFF1F\u5148\u5598\u53E3\u6C23 \u{1F319}';
}

// ============================================================
// WELCOME GUIDE
// ============================================================
var _welcomeStep=0;
function welcomeNext(){document.getElementById('welcomeStep'+_welcomeStep).classList.remove('active');_welcomeStep++;document.getElementById('welcomeStep'+_welcomeStep).classList.add('active')}
function welcomeDismiss(){document.getElementById('welcomeOverlay').classList.add('hidden')}
function checkFirstVisit(){}

// ============================================================
// COLLAPSIBLE TOGGLE
// ============================================================
function toggleCollapse(id){
  var el=document.getElementById(id);if(!el)return;
  if(el.style.display==='none'){el.style.display='block';el.previousElementSibling.querySelector('span').textContent=el.previousElementSibling.querySelector('span').textContent.replace('\u25B8','\u25BE')}
  else{el.style.display='none';el.previousElementSibling.querySelector('span').textContent=el.previousElementSibling.querySelector('span').textContent.replace('\u25BE','\u25B8')}
}

// ============================================================
// BACK TO TOP BUTTON
// ============================================================
function initBackToTop(){
  var btn=document.getElementById('backToTopBtn');
  var main=document.getElementById('mainContent');
  if(!btn||!main)return;
  main.addEventListener('scroll',function(){
    if(main.scrollTop>300)btn.classList.add('show');else btn.classList.remove('show');
  });
  btn.addEventListener('click',function(){main.scrollTo({top:0,behavior:'smooth'})});
}

// ============================================================
// POPSTATE HANDLER
// ============================================================
window.addEventListener('popstate',function(){
  if(document.getElementById('subOverlay').classList.contains('open')){closeSub();return}
  if(document.getElementById('detailOverlay').classList.contains('open')){closeDetail();return}
});

// ============================================================
// INIT
// ============================================================
renderSituations();
renderLearn();
renderMine();
updateGreeting();
checkFirstVisit();
initBackToTop();
</script>
