<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#c49a35">
<link rel="apple-touch-icon" href="https://pfst.cf2.poecdn.net/base/image/55b9306fd6c39e5b0a33a0206c30ab5b2144bd1798ff48db45eb8c36cfcbf006?w=1024&h=1024">
<link rel="icon" type="image/png" href="https://pfst.cf2.poecdn.net/base/image/55b9306fd6c39e5b0a33a0206c30ab5b2144bd1798ff48db45eb8c36cfcbf006?w=1024&h=1024">
<title>管理者事務系統</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --primary:#d4aa42;--primary-dark:#b39028;--primary-light:#faf3dc;
  --secondary:#7a9b7e;--secondary-dark:#5f8264;--secondary-light:#e5efe6;
  --accent:#c4a265;--accent-dark:#a88b4a;
  --bg:#efe9e0;--surface:#f9f6f1;
  --text:#3a3530;--text-light:#7a7269;--text-lighter:#b5aea5;
  --border:#ddd5ca;--shadow:0 1px 6px rgba(58,53,48,0.07);
  --radius:14px;--radius-sm:10px;
  --nav-h:85px;--header-h:56px;
}
html,body{height:100%;font-family:"Georgia","PingFang SC","Hiragino Sans GB","Microsoft YaHei",serif;background:var(--surface);color:var(--text);overflow:hidden;font-size:16px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.header{background:radial-gradient(ellipse at 85% 15%,rgba(245,225,165,0.5) 0%,transparent 50%),radial-gradient(ellipse at 10% 65%,rgba(180,145,55,0.25) 0%,transparent 45%),radial-gradient(ellipse at 55% 90%,rgba(230,200,120,0.3) 0%,transparent 40%),linear-gradient(180deg,rgba(215,175,70,0.92) 0%,rgba(196,154,53,0.85) 100%);-webkit-backdrop-filter:blur(14px) saturate(1.5);backdrop-filter:blur(14px) saturate(1.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 20px 14px;display:flex;align-items:center;justify-content:space-between;min-height:calc(var(--header-h) + env(safe-area-inset-top,0px));flex-shrink:0;position:relative;z-index:10;border-bottom:1px solid rgba(255,255,255,0.22);overflow:hidden}
.header::before{content:'';position:absolute;right:50px;top:calc(env(safe-area-inset-top,0px) * 0.3);width:90px;height:75px;background:radial-gradient(ellipse at center,rgba(240,215,130,0.3) 0%,transparent 70%);pointer-events:none}
.header::after{content:'';position:absolute;right:68px;top:calc(env(safe-area-inset-top,0px) * 0.3 + 12px);width:50px;height:50px;background:rgba(240,218,145,0.28);clip-path:polygon(50% 0%,62% 38%,100% 50%,62% 62%,50% 100%,38% 62%,0% 50%,38% 38%);-webkit-filter:blur(2px);filter:blur(2px);pointer-events:none}
.header h1{color:#e8e2d8;font-size:18px;font-weight:700;letter-spacing:1px}
.header-sub{color:rgba(232,226,216,0.7);font-size:11px;margin-top:2px;letter-spacing:0.5px}
.header-btn{background:rgba(232,226,216,0.15);border:none;color:#e8e2d8;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.header-btn:active{background:rgba(232,226,216,0.3)}

/* MAIN CONTENT */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px;background:var(--bg)}

/* PAGES */
.page{display:none;padding:16px;animation:fadeIn .25s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardEnter{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* BOTTOM NAV */
.nav{display:flex;background:var(--surface);border-top:2px solid var(--border);padding:8px 0 0;padding-bottom:max(10px,calc(env(safe-area-inset-bottom) + 8px));flex-shrink:0;position:relative;z-index:10}
.nav::after{content:'';position:absolute;left:0;right:0;top:100%;height:env(safe-area-inset-bottom,0px);background:var(--surface)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0;cursor:pointer;transition:color .2s;color:var(--text-lighter);border:none;background:none;font-family:inherit}
.nav-item.active{color:var(--primary-dark)}
.nav-item .nav-icon{font-size:28px;line-height:1}
.nav-item .nav-label{font-size:13px;font-weight:600}

/* GLOBAL SEARCH */
.global-search{background:#5a6a7e;padding:0 16px;max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;flex-shrink:0}
.global-search.open{max-height:70px;padding:10px 16px}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:14px 16px 14px 44px;border:2px solid var(--border);border-radius:var(--radius);font-size:16px;background:var(--surface);color:var(--text);outline:none;transition:border-color .2s;font-family:inherit}
.search-input:focus{border-color:var(--primary)}
.search-input::placeholder{color:var(--text-lighter)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-lighter);pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:var(--text-lighter);color:#fff;border:none;width:22px;height:22px;border-radius:50%;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}
.search-clear.show{display:flex}

/* CORE MINDSET CARD */
.core-mindset-card{background:var(--surface);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);cursor:pointer;border-left:4px solid var(--primary);transition:transform .15s,opacity .3s}
.core-mindset-card.mgmt-card{border-left-color:var(--accent)}
.core-mindset-card.mgmt-card .core-mindset-label{color:var(--accent-dark)}
.core-mindset-card:active{transform:scale(0.98)}
.core-mindset-icon{font-size:32px;flex-shrink:0}
.core-mindset-body{flex:1;min-width:0}
.core-mindset-label{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px}
.core-mindset-text{font-size:14px;line-height:1.6;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.core-mindset-arrow{font-size:20px;color:var(--text-lighter);flex-shrink:0}

/* HOME TAB TOGGLE */
.home-tab-bar{display:flex;background:var(--surface);border-radius:var(--radius);padding:3px;margin-bottom:14px;box-shadow:var(--shadow);border:1px solid var(--border)}
.home-tab{flex:1;padding:10px 0;text-align:center;border-radius:calc(var(--radius) - 2px);font-size:15px;font-weight:600;color:var(--text-light);border:none;background:transparent;cursor:pointer;transition:all .25s;font-family:inherit}
.home-tab.active{background:var(--primary);color:#e8e2d8;box-shadow:0 2px 8px rgba(212,170,66,0.25)}
.home-tab.active.mgmt{background:var(--accent-dark);box-shadow:0 2px 8px rgba(168,139,74,0.25)}
.home-tab.active.selfcare{background:var(--secondary);box-shadow:0 2px 8px rgba(122,155,126,0.25)}

/* PAGE DESCRIPTION */
.page-desc{font-size:13px;color:var(--text-light);text-align:center;margin-bottom:14px;line-height:1.5}

/* EMERGENCY QUICK BUTTON */
.emergency-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:16px 16px;border-radius:var(--radius);border:none;background:linear-gradient(135deg,#b5706a,#a06058);color:#fff;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:14px;font-family:inherit;box-shadow:0 3px 12px rgba(160,96,88,0.3);transition:transform .15s}
.emergency-btn:active{transform:scale(0.97)}

/* SCENARIO GRID */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.scenario-grid>.scenario-card:last-child:nth-child(odd){grid-column:1/-1}
.scenario-card{background:var(--surface);border-radius:var(--radius);padding:20px 14px;text-align:center;box-shadow:var(--shadow);cursor:pointer;transition:transform .2s;border:1px solid var(--border);position:relative;overflow:hidden;animation:cardEnter .4s ease both}
.scenario-card:nth-child(1){animation-delay:.05s}
.scenario-card:nth-child(2){animation-delay:.1s}
.scenario-card:nth-child(3){animation-delay:.15s}
.scenario-card:nth-child(4){animation-delay:.2s}
.scenario-card:nth-child(5){animation-delay:.25s}
.scenario-card:nth-child(6){animation-delay:.3s}
.scenario-card:active{transform:scale(0.97)}
.scenario-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.scenario-card .card-icon{font-size:36px;margin-bottom:8px;display:block}
.scenario-card .card-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px}
.scenario-card .card-subtitle{font-size:12px;color:var(--text-light);line-height:1.4}

/* Scenario card colors (muted) */
.scenario-card[data-id="hygiene"]::before{background:#6b9e7e}
.scenario-card[data-id="equipment"]::before{background:#6b8aaf}
.scenario-card[data-id="noise"]::before{background:#c4a265}
.scenario-card[data-id="injury"]::before{background:#b5706a}
.scenario-card[data-id="emotional"]::before{background:#8e7baf}
.scenario-card[data-id="fraud"]::before{background:#b07a95}

/* Management scenario card colors (muted) */
.scenario-card[data-id="sub-overstep"]::before{background:#7b80b8}
.scenario-card[data-id="sub-lazy"]::before{background:#c49560}
.scenario-card[data-id="sub-depend"]::before{background:#5a9ea8}
.scenario-card[data-id="sup-account"]::before{background:#a06058}
.scenario-card[data-id="sup-disagree"]::before{background:#8a6db0}
.scenario-card[data-id="sup-bypass"]::before{background:#6b7580}

/* Home section titles */
.home-section-title{display:flex;align-items:center;gap:8px;padding:14px 0 10px;margin-top:8px}
.home-section-title span{font-size:16px;font-weight:700;color:var(--text-light);letter-spacing:0.5px}
.home-section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* SEARCH RESULTS */
.search-results{display:none}
.search-results.show{display:block}
.search-result-item{background:var(--surface);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s;border:1px solid var(--border)}
.search-result-item:active{transform:scale(0.98)}
.search-result-item .result-tag{display:inline-block;font-size:12px;padding:3px 10px;border-radius:20px;margin-bottom:6px;font-weight:600}
.search-result-item .result-text{font-size:15px;line-height:1.6}
.search-result-item mark{background:#e8d8b8;color:var(--text);padding:1px 4px;border-radius:2px}
.search-no-result{text-align:center;padding:40px 20px;color:var(--text-light)}
.search-no-result .no-result-icon{font-size:48px;margin-bottom:12px;display:block}

/* SCENARIO DETAIL OVERLAY */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.detail-overlay.open{display:flex;animation:slideUp .3s ease}
.detail-header{background:radial-gradient(ellipse at 80% 25%,rgba(240,220,150,0.4) 0%,transparent 50%),radial-gradient(ellipse at 15% 70%,rgba(185,150,60,0.2) 0%,transparent 45%),linear-gradient(180deg,rgba(215,175,70,0.92) 0%,rgba(196,154,53,0.85) 100%);-webkit-backdrop-filter:blur(14px) saturate(1.5);backdrop-filter:blur(14px) saturate(1.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;color:#e8e2d8;border-bottom:1px solid rgba(255,255,255,0.22)}
.detail-header .back-btn{background:rgba(232,226,216,0.2);border:none;color:#e8e2d8;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.detail-header .back-btn:active{background:rgba(232,226,216,0.35)}
.detail-header h2{font-size:18px;font-weight:700}
.detail-body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--bg);padding:12px 16px;padding-bottom:max(20px,env(safe-area-inset-bottom))}

/* ACCORDION */
.accordion{margin-bottom:10px;animation:cardEnter .3s ease both}
.detail-body .accordion:nth-child(1){animation-delay:.03s}
.detail-body .accordion:nth-child(2){animation-delay:.06s}
.detail-body .accordion:nth-child(3){animation-delay:.09s}
.detail-body .accordion:nth-child(4){animation-delay:.12s}
.detail-body .accordion:nth-child(5){animation-delay:.15s}
.detail-body .accordion:nth-child(6){animation-delay:.18s}
.detail-body .accordion:nth-child(7){animation-delay:.21s}
.detail-body .accordion:nth-child(8){animation-delay:.24s}
.detail-body .accordion:nth-child(9){animation-delay:.27s}
.accordion-trigger{width:100%;background:var(--surface);border:none;padding:14px 16px;display:flex;align-items:center;gap:10px;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;border-radius:var(--radius-sm);box-shadow:var(--shadow);transition:background .15s;font-family:inherit;text-align:left;border:1px solid var(--border)}
.accordion-trigger:active{background:#f0ebe3}
.accordion-trigger .acc-icon{font-size:18px;flex-shrink:0}
.accordion-trigger .acc-arrow{margin-left:auto;font-size:12px;color:var(--text-lighter);transition:transform .25s;flex-shrink:0}
.accordion.open .acc-arrow{transform:rotate(90deg)}
.accordion-content{max-height:0;overflow:hidden;transition:max-height .3s ease}
.accordion.open .accordion-content{max-height:2000px}
.accordion-inner{padding:12px 16px;background:var(--surface);border-radius:0 0 var(--radius-sm) var(--radius-sm);margin-top:-4px;border:1px solid var(--border);border-top:none}
.accordion-inner p,.accordion-inner li{font-size:15px;line-height:1.8;color:#555048}
.accordion-inner ul{list-style:none;padding:0}
.accordion-inner li{padding:4px 0;padding-left:0}
.accordion-inner li::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:8px;vertical-align:middle}
.accordion-inner .action-list li::before{background:var(--secondary)}
.accordion-inner .script-list li{position:relative;padding:8px 12px;background:#f4f0e8;border-left:3px solid var(--accent);border-radius:0 6px 6px 0;margin:6px 0}
.accordion-inner .script-list li::before{display:none}
.accordion-inner .dont-list li{color:#8a5a4f}
.accordion-inner .dont-list li::before{background:#a06058}
.accordion-inner .followup-list li::before{background:var(--accent)}
.copy-btn{background:none;border:1px solid var(--border);color:var(--text-light);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;display:inline-block;margin-top:6px;font-family:inherit}
.copy-btn:active{background:var(--secondary-light);color:var(--secondary-dark);border-color:var(--secondary)}

/* MINDSET PAGE */
.mindset-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border-left:4px solid var(--primary)}
.mindset-card h3{font-size:17px;color:var(--primary-dark);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.mindset-card p{font-size:15px;line-height:1.8;color:#555048}
.mindset-card .highlight{background:var(--accent);padding:2px 6px;border-radius:4px;font-weight:600}
.mindset-hero{background:radial-gradient(ellipse at 75% 20%,rgba(245,225,165,0.45) 0%,transparent 50%),radial-gradient(ellipse at 20% 75%,rgba(185,150,60,0.25) 0%,transparent 45%),linear-gradient(180deg,rgba(215,175,70,0.92) 0%,rgba(196,154,53,0.85) 100%);-webkit-backdrop-filter:blur(14px) saturate(1.5);backdrop-filter:blur(14px) saturate(1.5);border-radius:var(--radius);padding:24px 20px;margin-bottom:16px;text-align:center;color:#e8e2d8;box-shadow:0 2px 12px rgba(212,170,66,0.2);animation:cardEnter .4s ease both}
.mindset-hero .hero-quote{font-size:20px;font-weight:700;margin-bottom:6px}
.mindset-hero .hero-sub{font-size:13px;opacity:0.8}

/* CHECKLIST PAGE */
.checklist-progress{background:var(--surface);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;box-shadow:var(--shadow);text-align:center;border:1px solid var(--border)}
.checklist-progress .progress-text{font-size:15px;color:var(--text-light);margin-bottom:8px}
.checklist-progress .progress-text span{color:var(--secondary-dark);font-weight:700;font-size:20px}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--secondary);border-radius:4px;transition:width .3s ease;width:0}
.checklist-item{background:var(--surface);border-radius:var(--radius);padding:18px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s,background .2s,border-color .2s;-webkit-user-select:none;user-select:none;animation:cardEnter .3s ease both;border:1px solid var(--border);border-left:4px solid var(--secondary)}
.checklist-item:nth-child(2){animation-delay:.03s}
.checklist-item:nth-child(3){animation-delay:.06s}
.checklist-item:nth-child(4){animation-delay:.09s}
.checklist-item:nth-child(5){animation-delay:.12s}
.checklist-item:nth-child(6){animation-delay:.15s}
.checklist-item:nth-child(7){animation-delay:.18s}
.checklist-item:nth-child(8){animation-delay:.21s}
.checklist-item:nth-child(9){animation-delay:.24s}
.checklist-item:active{transform:scale(0.97)}
.checklist-item.checked{background:#eee9df;border-left-color:var(--text-lighter)}
.checklist-item .check-box{width:30px;height:30px;border:2px solid var(--border);border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;margin-top:2px}
.checklist-item.checked .check-box{background:var(--secondary);border-color:var(--secondary);color:#fff}
.checklist-item .check-step{font-size:12px;color:var(--secondary);font-weight:700;margin-bottom:3px;letter-spacing:0.5px}
.checklist-item .check-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
.checklist-item .check-desc{font-size:14px;color:var(--text-light);line-height:1.6}
.checklist-item.checked .check-step{color:var(--text-lighter)}
.checklist-item.checked .check-title{text-decoration:line-through;color:var(--text-lighter)}
.checklist-item.checked .check-desc{color:var(--text-lighter)}
.reset-btn{display:block;margin:16px auto;background:none;border:1px solid var(--text-lighter);color:var(--text-light);padding:12px 30px;border-radius:var(--radius);font-size:15px;cursor:pointer;transition:all .2s;font-family:inherit}
.reset-btn:active{background:var(--primary-light);border-color:var(--primary);color:var(--primary)}

/* MORE PAGE */
.more-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);cursor:pointer;display:flex;align-items:center;gap:14px;transition:transform .2s;animation:cardEnter .35s ease both;border:1px solid var(--border)}
.more-card:nth-child(1){animation-delay:.05s}
.more-card:nth-child(2){animation-delay:.1s}
.more-card:nth-child(3){animation-delay:.15s}
.more-card:nth-child(4){animation-delay:.2s}
.more-card:active{transform:scale(0.98)}
.more-card .more-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.more-card .more-info h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px}
.more-card .more-info p{font-size:13px;color:var(--text-light)}
.more-card .more-arrow{margin-left:auto;color:var(--text-lighter);font-size:18px}

/* MINDSET DETAIL PANEL */
.mindset-detail-panel{background:var(--surface);border-radius:var(--radius);padding:18px;margin-top:12px;box-shadow:var(--shadow);border:1px solid var(--border);animation:fadeIn .25s ease}
.mindset-detail-panel .detail-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.mindset-detail-panel .detail-body{font-size:15px;line-height:1.8;color:#555048}

/* SUB PAGE (for More items) */
.sub-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
.sub-overlay.open{display:flex;animation:slideUp .3s ease}
.sub-header{background:radial-gradient(ellipse at 80% 25%,rgba(240,220,150,0.4) 0%,transparent 50%),radial-gradient(ellipse at 15% 70%,rgba(185,150,60,0.2) 0%,transparent 45%),linear-gradient(180deg,rgba(215,175,70,0.92) 0%,rgba(196,154,53,0.85) 100%);-webkit-backdrop-filter:blur(14px) saturate(1.5);backdrop-filter:blur(14px) saturate(1.5);padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 14px;display:flex;align-items:center;gap:12px;flex-shrink:0;color:#e8e2d8;border-bottom:1px solid rgba(255,255,255,0.22)}
.sub-header .back-btn{background:rgba(232,226,216,0.15);border:none;color:#e8e2d8;width:34px;height:34px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sub-header h2{font-size:18px;font-weight:700}

/* Sub page content */
.info-section{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.info-section h3{font-size:16px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.info-section p,.info-section li{font-size:15px;line-height:1.8;color:#555048}
.info-section ul{list-style:none;padding:0}
.info-section li{padding:3px 0}

/* Record form */
.record-form{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:16px;border:1px solid var(--border)}
.form-row{display:flex;border-bottom:1px solid var(--border)}
.form-row:last-child{border-bottom:none}
.form-label{width:110px;flex-shrink:0;padding:12px;font-size:14px;font-weight:600;color:var(--primary-dark);background:#e8e2d8}
.form-value{flex:1;padding:12px;font-size:14px;color:var(--text-light)}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(58,53,48,0.88);color:#e8e2d8;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* SECTION TITLE */
.section-title{font-size:13px;color:var(--text-light);font-weight:600;text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 10px;padding-left:4px}
.section-title:first-child{margin-top:0}

/* SELFCARE */
.selfcare-card{background:var(--surface);border-radius:var(--radius);padding:18px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border)}
.selfcare-card h3{font-size:16px;font-weight:700;margin-bottom:8px}
.selfcare-card h3 .state-num{display:inline-flex;width:24px;height:24px;border-radius:50%;background:var(--primary);color:#e8e2d8;font-size:12px;align-items:center;justify-content:center;margin-right:6px}
.selfcare-card .state-trigger{font-weight:600;color:var(--accent-dark);margin-bottom:4px;font-size:15px}
.selfcare-card p{font-size:15px;line-height:1.8;color:#555048}
.selfcare-tip{background:linear-gradient(135deg,#e5efe6,#eef3e8);border-radius:var(--radius);padding:18px;margin-bottom:12px;border:1px solid #d0ddd2}
.selfcare-tip h3{font-size:16px;font-weight:700;color:var(--secondary-dark);margin-bottom:8px}
.selfcare-tip p,.selfcare-tip li{font-size:15px;line-height:1.8;color:#555048}

/* BREATHING TIMER */
.breath-widget{text-align:center;padding:20px 0 10px}
.breath-start-btn{background:var(--secondary);color:#fff;border:none;padding:14px 32px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 3px 12px rgba(122,155,126,0.3);transition:transform .15s,opacity .15s}
.breath-start-btn:active{transform:scale(0.95)}
.breath-circle-wrap{display:none;flex-direction:column;align-items:center;gap:14px}
.breath-circle-wrap.active{display:flex}
.breath-circle{width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,var(--secondary-light),#e8f0e8);border:4px solid var(--secondary);display:flex;align-items:center;justify-content:center;transition:transform 4s ease-in-out,border-color .5s;position:relative}
.breath-circle.inhale{transform:scale(1.35);border-color:var(--secondary)}
.breath-circle.hold{transform:scale(1.35);border-color:var(--accent)}
.breath-circle.exhale{transform:scale(1);border-color:var(--primary);transition:transform 6s ease-in-out,border-color .5s}
.breath-label{font-size:18px;font-weight:700;color:var(--secondary-dark)}
.breath-phase{font-size:15px;color:var(--text-light);font-weight:600}
.breath-count{font-size:13px;color:var(--text-lighter)}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--text-lighter);border-radius:2px}
</style>
</head>
<body>
<div id="app">
  <!-- HEADER -->

<script>
// ============================================================
// DATA
// ============================================================
const SCENARIOS = [
  {
    id:'hygiene', icon:'🧹', title:'客房衛生投訴', subtitle:'血跡、毛髮、污漬等', color:'#6b9e7e', colorLight:'#e5efe6',
    situations:['客人發現床單/枕頭上有血跡','浴室有毛髮、污漬、異味','地毯有明顯髒污或蟲害痕跡'],
    mindset:['「我是解決問題的人，不是製造問題的人。」','「客人的情緒是對事不對人，我只需回應事實。」','「旁觀者視角：如果我是第三方顧問，我會怎麼做？」'],
    selfTalk:['深呼吸 → 告訴自己：這不是針對我個人的攻擊','「這是一個流程問題，我有能力、有權限去解決它。」','「我的專業就是讓這件事消失，這是我的價值所在。」'],
    actions:['立即致歉（不辯解）：先處理情緒，再處理事情','親自或派人到場確認情況並拍照記錄','提供即時解決方案：換房 / 重新清潔 / 升級房型','贈送補償（餐飲券/水果/amenity升級）','15分鐘內回訪確認客人滿意度'],
    scripts:['「非常抱歉給您帶來不好的體驗，這完全不應該發生。」','「我馬上為您處理，您看換一間房間可以嗎？」','「我們會立即調查原因，確保不會再次發生。」','「為表歉意，我為您準備了___，希望能彌補您的不便。」'],
    followUp:['當日填寫投訴記錄表，追溯清潔責任人','24小時內與客人再次確認住宿體驗','納入每週品質會議檢討，更新清潔SOP'],
    donts:['不要說「不可能」「我們從來沒有這種問題」','不要推卸責任給清潔員（對客人而言你就是酒店）','不要在客人面前討論內部流程','不要讓客人等超過10分鐘沒有回覆']
  },
  {
    id:'equipment', icon:'🔧', title:'設施設備故障', subtitle:'空調、Wi-Fi、水壓等', color:'#6b8aaf', colorLight:'#e4eaf1',
    situations:['空調不製冷/不製熱','電視、Wi-Fi、保險箱無法使用','水壓不足、熱水不足','房卡失效、門鎖故障'],
    mindset:['「設備問題是最容易解決的投訴，這是我的主場。」','「旁觀者視角：客人付了錢，設備正常是基本要求。」'],
    selfTalk:['「這是技術問題，不是情緒問題，按流程走就好。」','「速度就是態度——越快修好，客人怨氣越少。」'],
    actions:['致歉並記錄具體問題','評估修復時間：30分鐘內可修 → 安排維修','無法短時間修復 → 立即換房','提供臨時替代方案（如：提供風扇、行動Wi-Fi）','維修完成後回訪確認'],
    scripts:['「很抱歉設備給您帶來不便，我馬上安排工程部來處理。」','「預計___分鐘內可以修好，期間我先為您___。」','「如果您不想等，我可以馬上幫您換到另一間房。」'],
    followUp:['維修完成後立即通知客人並確認','記錄設備故障頻率，納入預防性維護計畫'],
    donts:['不要說「這很正常」「其他客人沒反映」','不要讓客人反覆聯繫不同部門','不要給不確定的修復時間承諾']
  },
  {
    id:'noise', icon:'🔊', title:'噪音 / 鄰房干擾', subtitle:'深夜喧嘩、施工噪音等', color:'#c4a265', colorLight:'#f0eadb',
    situations:['鄰房客人深夜大聲喧嘩','走廊施工/清潔噪音影響休息','空調或設備持續發出異響'],
    mindset:['「我是客人安寧的守護者，這是我的專業範疇。」','「旁觀者視角：兩邊都是客人，我要公正處理。」','「投訴是信任的表現——客人相信我能幫他解決。」'],
    selfTalk:['「客人只是想好好休息，這個需求完全合理。」','「我不需要完美解決，只需要讓客人感受到被重視。」'],
    actions:['立即致歉，表示理解客人的困擾','聯繫噪音來源方：禮貌提醒/警告','如無法解決：提供換房方案','提供耳塞、安排安靜樓層','記錄時間及細節，以備後續跟進'],
    scripts:['「非常理解您的困擾，讓我馬上為您處理。」','「我會先聯繫鄰房提醒，如果還是有噪音，我們可以為您換到安靜的樓層。」','「為了讓您有更好的休息體驗，我為您準備了___。」'],
    followUp:['30分鐘後回訪確認問題是否解決','次日早上再次關心客人休息狀況','如涉及設備問題，安排工程部維修並記錄'],
    donts:['不要忽視客人的投訴（即使你覺得噪音不大）','不要透露其他客人的房號或個人信息','不要只說「我們會處理」卻沒有實際行動']
  },
  {
    id:'injury', icon:'🤕', title:'客人受傷', subtitle:'滑倒、撞傷、燙傷等', color:'#b5706a', colorLight:'#f0e4e2',
    situations:['客人在浴室滑倒','客人被房間設施撞傷/割傷','客人被熱水/熱飲燙傷','兒童在房間內受傷'],
    mindset:['「安全第一，程序第二，責任最後。」','「我現在的角色是急救協調者，不是責任判定者。」','「旁觀者視角：冷靜判斷傷勢嚴重程度，啟動對應流程。」'],
    selfTalk:['「先救人，其他事情之後再處理。」','「保持冷靜是我能給客人的最大安慰。」','「我不需要現在判定責任歸屬，那是後續的事。」'],
    actions:['第一時間趕到現場，評估傷勢程度','立即通知保安部 First Aid 團隊到場處理','同步通知值班經理 + 客房經理/主管','輕微：由 First Aid 團隊提供急救處理（冰敷、創可貼等）','中度/嚴重：撥打急救電話，安排人員陪同就醫','現場拍照、保留證據（不要移動物品）','填寫事故報告，通知保險部門'],
    scripts:['「您現在感覺怎麼樣？請先別動，讓我看看情況。」','「我馬上幫您處理，請放心，我們會全力協助。」','「需要我幫您聯繫家人嗎？」','「我們會承擔相關的醫療費用，請您放心。」（需經授權）'],
    followUp:['每日致電/探訪關心客人恢復情況','保留完整事故記錄供法務及保險使用','48小時內完成事故原因調查及整改措施','更新安全檢查清單，預防同類事故'],
    donts:['不要在現場承認全部法律責任（表達關心即可）','不要與客人爭論事故原因','不要移動現場物品（保留證據）','不要忽視「看起來很輕微」的傷勢','不要讓客人獨自去醫院']
  },
  {
    id:'emotional', icon:'😤', title:'情緒激動 / 無理要求', subtitle:'咆哮、威脅差評、索賠等', color:'#8e7baf', colorLight:'#eae5f0',
    situations:['客人大聲咆哮、使用侮辱性語言','客人威脅在社交媒體差評','客人提出超出合理範圍的補償要求','客人長時間糾纏不放'],
    mindset:['「他的情緒是他的，我的情緒是我的，我選擇不接收。」','「旁觀者視角：如果我是在看一齣戲，這一幕很快就會過去。」','「我的底線是清楚的，我可以同理但不需要妥協原則。」'],

    actions:['保持冷靜，降低音量和語速','用積極傾聽回應：複述客人的訴求','設定合理期望：說明可以做什麼','提供你權限內最大的補償方案','超出權限 → 禮貌告知需要上級授權','如客人有威脅行為 → 通知保安，保護自己和其他客人'],
    scripts:['「我理解您很生氣，讓我來幫您解決這個問題。」','「您的感受我完全理解。我能為您做的是___。」','「這件事我需要向上級確認，請給我___分鐘時間。」','「為了您和其他客人的安全，我需要請您___。」'],
    followUp:['事後記錄完整經過，包含客人言行及處理過程','與上級覆盤，確認處理方式是否恰當','如有心理壓力，與同事或主管傾訴（保護自己）'],
    donts:['不要以牙還牙、提高音量','不要做出超出權限的承諾','不要獨自面對有暴力傾向的客人','不要在事後反覆自責（你已經盡力了）']

  {

    situations:['客人聲稱床單有血跡/體液，要求高額賠償','小問題（電梯慢、少毛巾）要求免房費或全額退款','威脅在社交媒體/OTA差評來索取補償','聲稱「被承諾了」免費升級但系統無記錄','吃完才投訴菜品有問題要求全額免單'],
    redFlags:['⚠ 訴求和問題嚴重不成比例（小問題要大補償）','⚠ 第一句話就是「你們要怎麼賠」而不是描述問題','⚠ 拒絕你提供的實際補救（換房、重新清潔）只要錢','⚠ 退房時才提出（住了三晚到退房才說有問題）','⚠ 描述與現場不符、照片只有截圖沒有原圖','⚠ 過度熟悉補償流程（「你們一般都是免一晚的」）','⚠ 拒絕報警或拒絕醫療協助但堅持要賠償'],

function renderHome(){
  const grid=document.getElementById('scenarioGrid');
  const scenarioOrder=['hygiene','fraud','injury','emotional','noise','equipment'];
  const ordered=scenarioOrder.map(id=>SCENARIOS.find(s=>s.id===id));
  grid.innerHTML=ordered.map((s,i)=>`
    <div class="scenario-card" data-id="${s.id}" onclick="openDetail('${s.id}')">
      ${i===0?'<span style="position:absolute;top:8px;right:8px;background:'+s.color+';color:#fff;font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600">常用</span>':''}
      <span class="card-icon">${s.icon}</span>
      <div class="card-title">${s.title}</div>
      <div class="card-subtitle">${s.subtitle}</div>
    </div>
  `).join('');
  const mgmtGrid=document.getElementById('mgmtGrid');
  mgmtGrid.innerHTML=MGMT_SCENARIOS.map((s,i)=>`
    <div class="scenario-card" data-id="${s.id}" onclick="openDetail('${s.id}')" style="animation-delay:${(.05*(i+1)).toFixed(2)}s">
      <span class="card-icon">${s.icon}</span>
      <div class="card-title">${s.title}</div>
      <div class="card-subtitle">${s.subtitle}</div>
    </div>
  `).join('');
}

function switchHomeTab(tab){
  const isComplaint=(tab==='complaint');
  document.getElementById('scenarioGrid').style.display=isComplaint?'':'none';
  document.getElementById('mgmtGrid').style.display=isComplaint?'none':'';
  const tabC=document.getElementById('tabComplaint');
  const tabM=document.getElementById('tabMgmt');

function showMindsetDetail(type,idx){

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

function toggleGlobalSearch(){
  const bar=document.getElementById('globalSearch');
  const input=document.getElementById('searchInput');
  if(bar.classList.contains('open')){
    bar.classList.remove('open');
    if(document.getElementById('page-search').classList.contains('active')){
      clearSearch();
      switchPage(_prevPage);
    }
  }else{
    bar.classList.add('open');
    setTimeout(()=>input.focus(),200);
  }
}

function handleSearch(query){
  const clearBtn=document.getElementById('searchClear');
  const results=document.getElementById('searchResults');

  if(!query.trim()){
    clearBtn.classList.remove('show');
    // Return to previous page
    if(document.getElementById('page-search').classList.contains('active')){
      switchPage(_prevPage);
    }
    return;
  }
  clearBtn.classList.add('show');
  // Switch to search results page
  switchPage('search');

  const q=query.toLowerCase();
  let html='';

  // Search scenarios
  SCENARIOS.forEach(s=>{
    const allText=[s.title,s.subtitle,...s.situations,...s.mindset,...s.selfTalk,...s.actions,...s.scripts,...s.followUp,...s.donts,...(s.redFlags||[])].join(' ');
    if(allText.toLowerCase().includes(q)){
      const matches=[];
      [...s.situations,...s.actions,...s.scripts,...s.donts,...(s.redFlags||[])].forEach(t=>{
        if(t.toLowerCase().includes(q))matches.push(t);
      });
      const preview=matches.length>0?matches.slice(0,2).map(m=>highlightText(m,q)).join('<br>'):'點擊查看詳情';
      html+=`<div class="search-result-item" onclick="openDetail('${s.id}')">
        <span class="result-tag" style="background:${s.colorLight};color:${s.color}">${s.icon} ${s.title}</span>
        <div class="result-text">${preview}</div>
      </div>`;
    }
  });

  // Search mindsets
  MINDSETS.forEach((m,i)=>{
    if((m.title+m.text).toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="switchPage('mindset');setTimeout(()=>showMindsetDetail('complaint',${i}),200)">
        <span class="result-tag" style="background:var(--primary-light);color:var(--primary)">${m.icon} 心法</span>
        <div class="result-text">${highlightText(m.title,q)}</div>
      </div>`;
    }
  });

  // Search special guests
  SPECIAL_GUESTS.forEach(g=>{
    const allText=[g.title,...g.items].join(' ');
    if(allText.toLowerCase().includes(q)){
      const match=g.items.find(i=>i.toLowerCase().includes(q));
      html+=`<div class="search-result-item" onclick="openSub('guests')">
        <span class="result-tag" style="background:#e5efe6;color:#5f8264">👥 特殊客群</span>
        <div class="result-text">${highlightText(g.icon+' '+g.title+(match?' — '+match:''),q)}</div>
      </div>`;
    }
  });

  // Search legal
  LEGAL.forEach(l=>{
    const allText=[l.title,...l.items].join(' ');
    if(allText.toLowerCase().includes(q)){
      const match=l.items.find(i=>i.toLowerCase().includes(q));
      html+=`<div class="search-result-item" onclick="openSub('legal')">
        <span class="result-tag" style="background:#eae5f0;color:#8a6db0">⚖️ 法律提醒</span>
        <div class="result-text">${highlightText(l.icon+' '+l.title+(match?' — '+match:''),q)}</div>
      </div>`;
    }
  });

  // Search management scenarios
  MGMT_SCENARIOS.forEach(s=>{
    const allText=[s.title,s.subtitle,...s.situations,...s.mindset,...s.selfTalk,...s.actions,...s.scripts,...s.donts].join(' ');
    if(allText.toLowerCase().includes(q)){
      const matches=[];
      [...s.situations,...s.actions,...s.scripts,...s.donts].forEach(t=>{
        if(t.toLowerCase().includes(q))matches.push(t);
      });
      const preview=matches.length>0?matches.slice(0,2).map(m=>highlightText(m,q)).join('<br>'):'點擊查看詳情';
      html+=`<div class="search-result-item" onclick="openDetail('${s.id}')">
        <span class="result-tag" style="background:${s.colorLight};color:${s.color}">👔 ${s.title}</span>
        <div class="result-text">${preview}</div>
      </div>`;
    }
  });

  // Search management mindsets
  MGMT_MINDSETS.forEach((m,i)=>{
    if((m.title+m.text).toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="switchPage('mindset');setTimeout(()=>{switchMindsetTab('mgmt');showMindsetDetail('mgmt',${i})},200)">
        <span class="result-tag" style="background:#f0eadb;color:var(--accent-dark)">${m.icon} 管理心法</span>
        <div class="result-text">${highlightText(m.title,q)}</div>
      </div>`;
    }
  });

  // Search emergency phrases
  EMERGENCY_PHRASES.forEach(e=>{
    if((e.situation+e.phrase).toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="openSub('emergency')">
        <span class="result-tag" style="background:#f0e4e2;color:#a06058">🆘 緊急話術</span>
        <div class="result-text">${highlightText(e.situation+' — '+e.phrase,q)}</div>
      </div>`;
    }
  });

  // Search self-care
  const selfcareText=JSON.stringify(SELFCARE).toLowerCase();
  if(selfcareText.includes(q)){
    html+=`<div class="search-result-item" onclick="switchPage('mindset');setTimeout(()=>switchMindsetTab('selfcare'),200)">
      <span class="result-tag" style="background:#e5efe6;color:#5f8264">💆 自我照顧</span>
      <div class="result-text">點擊查看自我照顧提醒</div>
    </div>`;
  }

  // Search checklist
  CHECKLIST.forEach(c=>{
    if((c.title+c.desc).toLowerCase().includes(q)){
      html+=`<div class="search-result-item" onclick="switchPage('checklist')">
        <span class="result-tag" style="background:var(--secondary-light);color:var(--secondary-dark)">✅ 標準流程</span>
        <div class="result-text">${highlightText('步驟'+c.step+'：'+c.title+' — '+c.desc,q)}</div>
      </div>`;
    }
  });

  // Search daily relations (now in MGMT_MINDSETS, also search detailed data)
  const dailyAll=[...DAILY_RELATIONS.subordinates,...DAILY_RELATIONS.superiors];
  dailyAll.forEach(s=>{
    if((s.title+s.text).toLowerCase().includes(q)){
      const dailyIdx=MGMT_MINDSETS.length-2;
      html+=`<div class="search-result-item" onclick="switchPage('mindset');setTimeout(()=>{switchMindsetTab('mgmt');showMindsetDetail('mgmt',${dailyIdx})},200)">
        <span class="result-tag" style="background:#f0eadb;color:var(--accent-dark)">🤝 日常相處</span>
        <div class="result-text">${highlightText(s.icon+' '+s.title,q)}</div>
      </div>`;
    }
  });

  // Search tough people (now in MGMT_MINDSETS, also search detailed data)
  const toughAll=[...TOUGH_PEOPLE.subordinates,...TOUGH_PEOPLE.superiors];
  toughAll.forEach(s=>{
    if((s.title+s.text).toLowerCase().includes(q)){
      const toughIdx=MGMT_MINDSETS.length-1;
      html+=`<div class="search-result-item" onclick="switchPage('mindset');setTimeout(()=>{switchMindsetTab('mgmt');showMindsetDetail('mgmt',${toughIdx})},200)">
        <span class="result-tag" style="background:#f0e4e2;color:#a06058">🛡️ 面對狠惡</span>
        <div class="result-text">${highlightText(s.icon+' '+s.title,q)}</div>
      </div>`;
    }
  });

  if(!html){
    html=`<div class="search-no-result"><span class="no-result-icon">🔍</span>找不到「${escapeHtml(query)}」相關內容<br><small>試試其他關鍵字</small></div>`;
  }
  results.innerHTML=html;
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  document.getElementById('searchClear').classList.remove('show');
  document.getElementById('searchResults').innerHTML='';
  if(document.getElementById('page-search').classList.contains('active')){
    switchPage(_prevPage);
  }
}
function closeGlobalSearch(){
  document.getElementById('globalSearch').classList.remove('open');
  clearSearch();
}

function highlightText(text,query){
  const regex=new RegExp(`(${escapeRegex(query)})`,'gi');
  return escapeHtml(text).replace(regex,'<mark>$1</mark>');
}

function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escapeRegex(s){return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')}

// ============================================================
// SCENARIO DETAIL
// ============================================================
function openDetail(id){
  const s=SCENARIOS.find(x=>x.id===id)||MGMT_SCENARIOS.find(x=>x.id===id);
  if(!s)return;
  const isMgmt=MGMT_SCENARIOS.includes(s);
  const overlay=document.getElementById('detailOverlay');
  const header=document.getElementById('detailHeader');
  const body=document.getElementById('detailBody');

  header.style.background=s.color;
  document.getElementById('detailTitle').textContent=s.icon+' '+s.title;

  // Build sections based on scenario type
  let sections=[
    {icon:'⚡',label:'即時行動',cls:'action-list',items:s.actions,open:true},
    {icon:'🎙',label:'溝通話術',cls:'script-list',items:s.scripts,open:true,copyable:true},
    {icon:'🚫',label:'禁忌事項',cls:'dont-list',items:s.donts},
  ];
  // Divider label
  sections.push({icon:'',label:'───── 延伸參考 ─────',cls:'',items:[],divider:true});
  sections.push({icon:'📌',label:'常見情境',cls:'',items:s.situations});
  if(s.redFlags){
    sections.push({icon:'🚩',label:'識別紅旗',cls:'dont-list',items:s.redFlags});
  }
  sections.push(
    {icon:'🧘',label:'心法口訣',cls:'',items:s.mindset},
    {icon:'🗣',label:'自我對話',cls:'',items:s.selfTalk}
  );
  if(s.followUp){
    sections.push({icon:'📋',label:'後續跟進',cls:'followup-list',items:s.followUp});
  }

  body.innerHTML=sections.map(sec=>{
    if(sec.divider) return `<div style="text-align:center;color:var(--text-lighter);font-size:13px;padding:8px 0;letter-spacing:2px">${sec.label}</div>`;
    return `
    <div class="accordion${sec.open?' open':''}">
      <button class="accordion-trigger" onclick="toggleAccordion(this)">
        <span class="acc-icon">${sec.icon}</span>
        ${sec.label}
        <span class="acc-arrow">▶</span>
      </button>
      <div class="accordion-content">
        <div class="accordion-inner">
          <ul class="${sec.cls}">
            ${sec.items.map((item,i)=>{
              const num=sec.cls==='action-list'?`<strong>${i+1}.</strong> `:'';
              const copyBtn=sec.copyable?`<br><button class="copy-btn" onclick="event.stopPropagation();copyText(\`${item.replace(/`/g,"'").replace(/\\/g,'\\\\')}\`)">📋</button>`:'';
              return `<li>${num}${escapeHtml(item)}${copyBtn}</li>`;
            }).join('')}
          </ul>
        </div>
      </div>
    </div>`;
  }).join('')
  // Add shortcut buttons at bottom (different for complaint vs management)
  +`<div style="display:flex;gap:10px;margin-top:16px;padding-bottom:12px">
      ${isMgmt
        ?'<button onclick="closeDetail();openSub(\'emergency\')" style="flex:1;padding:14px;border-radius:var(--radius);border:none;background:#a06058;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">🆘 緊急話術</button>'
        :'<button onclick="closeDetail();switchPage(\'checklist\')" style="flex:1;padding:14px;border-radius:var(--radius);border:none;background:var(--secondary);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit">✅ 標準流程</button>'
      }
      <button onclick="closeDetail();switchPage('mindset');setTimeout(()=>switchMindsetTab('selfcare'),200)" style="flex:1;padding:14px;border-radius:var(--radius);border:none;background:var(--primary-light);color:var(--primary-dark);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">💆 自我照顧</button>
    </div>`;

  overlay.classList.add('open');
  body.scrollTop=0;
}

function closeDetail(){
  document.getElementById('detailOverlay').classList.remove('open');
}

function toggleAccordion(btn){
  btn.parentElement.classList.toggle('open');
}

  let html='';

  switch(type){
    case 'record':

        <button onclick="copyAllEmergency()" style="width:100%;padding:14px;border-radius:var(--radius);border:2px dashed #a06058;background:#f0e4e2;color:#a06058;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:14px;font-family:inherit;transition:transform .15s" onmousedown="this.style.transform='scale(0.97)'" onmouseup="this.style.transform=''">📋 一鍵複製全部</button>
        ${EMERGENCY_PHRASES.map((e,i)=>`
          <div class="selfcare-card" style="border-left:4px solid #a06058">
            <h3><span class="state-num" style="background:#a06058">${i+1}</span>${e.situation}</h3>

          </div>
        `).join('')}`;
      break;
  }
  body.innerHTML=html;
  overlay.classList.add('open');

}

// ============================================================
// BREATHING TIMER (4-4-6 method)
// ============================================================
let _breathTimer=null;
function startBreathing(){
  const btn=document.getElementById('breathStartBtn');
  const wrap=document.getElementById('breathCircle');
  const ball=document.getElementById('breathBall');
  const label=document.getElementById('breathLabel');
  const phase=document.getElementById('breathPhase');
  const countEl=document.getElementById('breathCount');
  btn.style.display='none';
  wrap.classList.add('active');

  const cycles=3;
  let currentCycle=0;

  function runCycle(){
    if(currentCycle>=cycles){
      label.textContent='✓';
      phase.textContent='準備好了';
      countEl.textContent='';
      ball.className='breath-circle';
      setTimeout(()=>{
        wrap.classList.remove('active');
        btn.style.display='';
        btn.textContent='🫁 再來一次（3 組）';
      },2000);
      return;
    }
    countEl.textContent=`第 ${currentCycle+1} / ${cycles} 次`;

    // Inhale 4s
    ball.className='breath-circle inhale';
    label.textContent='吸氣';
    phase.textContent='慢慢吸氣... 4秒';
    let sec=4;
    clearInterval(_breathTimer);
    _breathTimer=setInterval(()=>{
      sec--;
      if(sec>0) phase.textContent=`慢慢吸氣... ${sec}秒`;
    },1000);

    setTimeout(()=>{
      clearInterval(_breathTimer);
      // Hold 4s
      ball.className='breath-circle hold';
      label.textContent='屏住';
      phase.textContent='屏住呼吸... 4秒';
      sec=4;
      _breathTimer=setInterval(()=>{
        sec--;
        if(sec>0) phase.textContent=`屏住呼吸... ${sec}秒`;
      },1000);

      setTimeout(()=>{
        clearInterval(_breathTimer);
        // Exhale 6s
        ball.className='breath-circle exhale';
        label.textContent='呼氣';
        phase.textContent='慢慢呼氣... 6秒';
        sec=6;
        _breathTimer=setInterval(()=>{
          sec--;
          if(sec>0) phase.textContent=`慢慢呼氣... ${sec}秒`;
        },1000);

        setTimeout(()=>{
          clearInterval(_breathTimer);
          currentCycle++;
          runCycle();
        },6000);
      },4000);
    },4000);
  }
  runCycle();
}

// ============================================================
// UTILITIES
// ============================================================
function copyText(text){
  navigator.clipboard.writeText(text).then(()=>showToast('已複製到剪貼板 📋')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast('已複製到剪貼板 📋');
  });
}
function copyAllEmergency(){
  const all=EMERGENCY_PHRASES.map((e,i)=>`${i+1}. ${e.situation}\n   ${e.phrase}`).join('\n\n');
  copyText(all);
  showToast('已複製全部 8 條話術 📋');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

  if(document.getElementById('subOverlay').classList.contains('open')){closeSub();return}

});
